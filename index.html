<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наш Бюджет</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>🍏 НАШ БЮДЖЕТ</h1></header>
    <div class="card bg-main">
        <div class="grid-2">
            <div>Гривня: <b id="b-UAH">0.00 UAH</b></div>
            <div>Долар: <b id="b-USD">0.00 USD</b></div>
            <div>Євро: <b id="b-EUR">0.00 EUR</b></div>
            <div>Злотий: <b id="b-PLN">0.00 PLN</b></div>
        </div>
    </div>
    <div class="card">
        <label>Тип</label>
        <div class="grid-2">
            <button onclick="setParam('type','expense')" id="t-expense" class="btn active">💸 Витрата</button>
            <button onclick="setParam('type','income')" id="t-income" class="btn">📈 Дохід</button>
        </div>
        <label>Хто</label>
        <div class="grid-2">
            <button onclick="setParam('user','Чоловік')" id="u-Чоловік" class="btn active">🙋‍♂️ Чоловік</button>
            <button onclick="setParam('user','Дружина')" id="u-Дружина" class="btn">🙋‍♀️ Дружина</button>
        </div>
        <label>Джерело</label>
        <div class="grid-2">
            <button onclick="setParam('source','Карта')" id="s-Карта" class="btn active">💳 Карта</button>
            <button onclick="setParam('source','Готівка')" id="s-Готівка" class="btn">💵 Готівка</button>
        </div>
        <label>Валюта</label>
        <div class="grid-4">
            <button onclick="setParam('curr','UAH')" id="c-UAH" class="btn active">UAH</button>
            <button onclick="setParam('curr','USD')" id="c-USD" class="btn">USD</button>
            <button onclick="setParam('curr','EUR')" id="c-EUR" class="btn">EUR</button>
            <button onclick="setParam('curr','PLN')" id="c-PLN" class="btn">PLN</button>
        </div>
        <label>Сума</label>
        <input type="number" id="amount" placeholder="0.00" class="input" inputmode="decimal">
        <label>Категорія</label>
        <select id="category" class="input">
            <option value="🛒 Продукти">🛒 Продукти</option>
            <option value="🏠 Комуналка">🏠 Комуналка</option>
            <option value="🚗 Транспорт">🚗 Транспорт</option>
            <option value="👶 Дитина">👶 Дитина</option>
            <option value="📉 Кредит">📉 Кредит</option>
            <option value="🏥 Здоров'я">🏥 Здоров'я</option>
            <option value="🛍️ Покупки">🛍️ Покупки</option>
            <option value="🍿 Розваги">🍿 Розваги</option>
            <option value="💼 Зарплата">💼 Зарплата</option>
            <option value="✨ Інше">✨ Інше</option>
        </select>
        <button onclick="addTransaction()" class="submit">💾 Зберегти в хмару</button>
    </div>
    <div class="card" id="stats-card" style="display:none;">
        <label>📊 Витрати за категоріями</label>
        <div id="stats-list"></div>
    </div>
    <label>Історія операцій (Реальний час)</label>
    <div id="list"></div>
    <script src="script.js"></script>
</body>
</html>
