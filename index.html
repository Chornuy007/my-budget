<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наш Бюджет</title>
    <!-- Виправлене підключення Tailwind CSS -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 pb-24">

    <!-- Хедер сайту -->
    <header class="bg-emerald-600 text-white p-4 sticky top-0 shadow-md flex justify-between items-center z-50">
        <h1 class="text-xl font-black tracking-tight">🍏 НАШ БЮДЖЕТ</h1>
        <span class="text-xs bg-emerald-700/60 font-semibold px-3 py-1.5 rounded-full border border-emerald-500/30">Сімейний облік</span>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-5">

        <!-- МУЛЬТИВАЛЮТНИЙ БАЛАНС -->
        <div class="bg-gradient-to-br from-emerald-600 to-teal-700 rounded-2xl p-5 text-white shadow-lg space-y-3">
            <p class="text-emerald-100 text-xs uppercase tracking-wider font-bold">Поточні залишки коштів</p>
            <div class="grid grid-cols-2 gap-3 pt-1">
                <div class="bg-emerald-800/30 p-2.5 rounded-xl border border-emerald-500/20">
                    <p class="text-xs text-emerald-200">Гривня (UAH)</p>
                    <p class="text-xl font-black mt-0.5" id="bal-UAH">0.00 ₴</p>
                </div>
                <div class="bg-emerald-800/30 p-2.5 rounded-xl border border-emerald-500/20">
                    <p class="text-xs text-emerald-200">Долар (USD)</p>
                    <p class="text-xl font-black mt-0.5" id="bal-USD">0.00 $</p>
                </div>
                <div class="bg-emerald-800/30 p-2.5 rounded-xl border border-emerald-500/20">
                    <p class="text-xs text-emerald-200">Євро (EUR)</p>
                    <p class="text-xl font-black mt-0.5" id="bal-EUR">0.00 €</p>
                </div>
                <div class="bg-emerald-800/30 p-2.5 rounded-xl border border-emerald-500/20">
                    <p class="text-xs text-emerald-200">Злотий (PLN)</p>
                    <p class="text-xl font-black mt-0.5" id="bal-PLN">0.00 zł</p>
                </div>
            </div>
        </div>

        <!-- ФОРМА ВВЕДЕННЯ ДАНИХ -->
        <div class="bg-white rounded-2xl p-5 shadow-xs border border-gray-100 space-y-4">
            
            <!-- 1. Вибір: Витрата чи Дохід -->
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">Тип операції</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setParam('type', 'expense')" id="type-expense" class="bg-emerald-600 text-white font-bold py-3 rounded-xl border border-emerald-600 text-center text-sm transition-all shadow-xs">💸 Витрата</button>
                    <button onclick="setParam('type', 'income')" id="type-income" class="bg-gray-50 text-gray-500 py-3 rounded-xl border border-gray-200 text-center text-sm transition-all">📈 Дохід</button>
                </div>
            </div>

            <!-- 2. Вибір: Хто вносить запис -->
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">Хто проводить</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setParam('user', 'Чоловік')" id="user-Чоловік" class="bg-emerald-600 text-white font-bold py-2.5 rounded-xl border border-emerald-600 text-center text-sm transition-all shadow-xs">🙋‍♂️ Чоловік</button>
                    <button onclick="setParam('user', 'Дружина')" id="user-Дружина" class="bg-gray-50 text-gray-500 py-2.5 rounded-xl border border-gray-200 text-center text-sm transition-all">🙋‍♀️ Дружина</button>
                </div>
            </div>

            <!-- 3. Вибір: Карта чи Готівка -->
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">Джерело коштів</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setParam('source', 'Карта')" id="source-Карта" class="bg-emerald-600 text-white font-bold py-2.5 rounded-xl border border-emerald-600 text-center text-sm transition-all shadow-xs">💳 Банківська карта</button>
                    <button onclick="setParam('source', 'Готівка')" id="source-Готівка" class="bg-gray-50 text-gray-500 py-2.5 rounded-xl border border-gray-200 text-center text-sm transition-all">💵 Готівка</button>
                </div>
            </div>

            <!-- 4. Вибір валюти -->
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5">Валюта</label>
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="setParam('currency', 'UAH')" id="curr-UAH" class="bg-emerald-600 text-white font-bold py-2 rounded-xl border border-emerald-600 text-center text-sm transition-all shadow-xs">UAH</button>
                    <button onclick="setParam('currency', 'USD')" id="curr-USD" class="bg-gray-50 text-gray-500 py-2 rounded-xl border border-gray-200 text-center text-sm font-bold transition-all">USD</button>
                    <button onclick="setParam('currency', 'EUR')" id="curr-EUR" class="bg-gray-50 text-gray-500 py-2 rounded-xl border border-gray-200 text-center text-sm font-bold transition-all">EUR</button>
                    <button onclick="setParam('currency', 'PLN')" id="curr-PLN" class="bg-gray-50 text-gray-500 py-2 rounded-xl border border-gray-200 text-center text-sm font-bold transition-all">PLN</button>
                </div>
            </div>

            <!-- Поля введення -->
            <div class="space-y-3 pt-2 border-t border-gray-100">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Сума</label>
                    <input type="number" id="amount" placeholder="0.00" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-emerald-500 text-xl font-black" inputmode="decimal">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Категорія</label>
                    <select id="category" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-emerald-500 bg-white text-gray-700 font-medium">
                        <option value="Продукти">🛒 Продукти</option>
                        <option value="Комуналка">🏠 Комуналка / Житло</option>
                        <option value="Транспорт">🚗 Транспорт / Паливо</option>
                        <option value="Здоров'я">🏥 Здоров'я / Ліки</option>
                        <option value="Розваги">🍿 Розваги / Кафе</option>
                        <option value="Покупки">🛍️ Покупки / Одяг</option>
                        <option value="Зарплата">💼 Зарплата / Дохід</option>
                        <option value="Інше">✨ Інше</option>
                    </select>
                </div>

                <button onclick="addTransaction()" class="w-full bg-emerald-600 text-white font-extrabold py-3.5 rounded-xl shadow-md hover:bg-emerald-700 active:scale-[0.98] transition-all text-base mt-2">💾 Зберегти операцію</button>
            </div>
        </div>

        <!-- ІСТОРІЯ ТРАНЗАКЦІЙ -->
        <div class="space-y-2">
            <h3 class="font-bold text-gray-400 text-xs uppercase tracking-wider px-1">Історія операцій</h3>
            <div id="transactions-list" class="space-y-2.5">
                <p class="text-center text-gray-400 py-6 text-sm bg-white rounded-xl border border-gray-100">Записів немає. Створіть перший запис вище.</p>
            </div>
        </div>

     </main>

    <script>
        let currentForm = { type: 'expense', user: 'Чоловік', source: 'Карта', currency: 'UAH' };
        let transactions = [];
        const symbols = { UAH: '₴', USD: '$', EUR: '€', PLN: 'zł' };

        const activeStyles = "bg-emerald-600 text-white font-bold border-emerald-600 shadow-xs";
        const inactiveStyles = "bg-gray-50 text-gray-500 border-gray-200";

        function setParam(param, value) {
            currentForm[param] = value;
            
            if (param === 'type') {
                document.getElementById('type-expense').className = `py-3 rounded-xl border text-center text-sm transition-all ${value === 'expense' ? activeStyles : inactiveStyles}`;
                document.getElementById('type-income').className = `py-3 rounded-xl border text-center text-sm transition-all ${value === 'income' ? activeStyles : inactiveStyles}`;
            }
            if (param === 'user') {
                document.getElementById('user-Чоловік').className = `py-2.5 rounded-xl border text-center text-sm transition-all ${value === 'Чоловік' ? activeStyles : inactiveStyles}`;
                document.getElementById('user-Дружина').className = `py-2.5 rounded-xl border text-center text-sm transition-all ${value === 'Дружина' ? activeStyles : inactiveStyles}`;
            }
            if (param === 'source') {
                document.getElementById('source-Карта').className = `py-2.5 rounded-xl border text-center text-sm transition-all ${value === 'Карта' ? activeStyles : inactiveStyles}`;
                document.getElementById('source-Готівка').className = `py-2.5 rounded-xl border text-center text-sm transition-all ${value === 'Готівка' ? activeStyles : inactiveStyles}`;
            }
            if (param === 'currency') {
                ['UAH', 'USD', 'EUR', 'PLN'].forEach(c => {
                    document.getElementById(`curr-${c}`).className = `py-2 rounded-xl border text-center text-sm font-bold transition-all ${value === c ? activeStyles : inactiveStyles}`;
                });
            }
        }

        function addTransaction() {
