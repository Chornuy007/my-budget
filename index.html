<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сімейний Бюджет</title>
    <!-- Підключаємо Tailwind CSS для гарного мобільного дизайну -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-900 pb-20">

    <!-- Верхня панель (Хедер) -->
    <header class="bg-indigo-600 text-white p-4 sticky top-0 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">💰 Наш Бюджет</h1>
        <span class="text-sm bg-indigo-700 px-3 py-1 rounded-full font-medium">Сім'я #1</span>
    </header>

    <!-- Головний екран мобільного -->
    <main class="p-4 max-w-md mx-auto space-y-4">

        <!-- Картка балансу -->
        <div class="bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl p-6 text-white shadow-lg">
            <p class="text-indigo-100 text-sm uppercase tracking-wider font-semibold">Поточний баланс</p>
            <p class="text-3xl font-black mt-1" id="total-balance">0.00 ₴</p>
            <div class="flex justify-between mt-4 pt-4 border-t border-indigo-400/30 text-sm">
                <div>🎯 Доходи: <span class="font-bold" id="total-income">+0 ₴</span></div>
                <div>🛒 Витрати: <span class="font-bold" id="total-expense">-0 ₴</span></div>
            </div>
        </div>

        <!-- Форма швидкого додавання транзакції -->
        <div class="bg-white rounded-2xl p-4 shadow-sm space-y-3">
            <h3 class="font-bold text-gray-700 text-sm uppercase tracking-wider">Нова операція</h3>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setType('expense')" id="btn-expense" class="py-2.5 rounded-xl font-bold text-center bg-red-100 text-red-600 border-2 border-red-500 transition-all">💸 Витрата</button>
                <button onclick="setType('income')" id="btn-income" class="py-2.5 rounded-xl font-bold text-center bg-gray-50 text-gray-500 border border-gray-200 transition-all">📈 Дохід</button>
            </div>
            
            <div class="space-y-2">
                <input type="number" id="amount" placeholder="Сума (напр. 250)" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-indigo-500 text-lg font-semibold" inputmode="decimal">
                <select id="category" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-indigo-500 text-gray-600">
                    <option value="Продукти">🛒 Продукти</option>
                    <option value="Комуналка">🏠 Комуналка</option>
                    <option value="Транспорт">🚗 Транспорт</option>
                    <option value="Розваги">🍿 Розваги</option>
                    <option value="Зарплата">💼 Зарплата</option>
                    <option value="Інше">✨ Інше</option>
                </select>
                <input type="text" id="comment" placeholder="Коментар (необов'язково)" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-indigo-500">
                <button onclick="addTransaction()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-md hover:bg-indigo-700 active:scale-[0.98] transition-all">Зберегти запис</button>
            </div>
        </div>

        <!-- Історія останніх витрат -->
        <div class="space-y-2">
            <h3 class="font-bold text-gray-500 text-xs uppercase tracking-wider px-1">Останні транзакції</h3>
            <div id="transactions-list" class="space-y-2">
                <!-- Сюди JavaScript додаватиме записи -->
                <p class="text-center text-gray-400 py-4 text-sm">Записів ще немає. Додайте першу витрату!</p>
            </div>
        </div>

    </main>

    <script>
        // Логіка інтерфейсу (поки без бази даних, для тесту в браузері)
        let currentType = 'expense';
        let transactions = [];

        function setType(type) {
            currentType = type;
            const btnExpense = document.getElementById('btn-expense');
            const btnIncome = document.getElementById('btn-income');
            
            if (type === 'expense') {
                btnExpense.className = "py-2.5 rounded-xl font-bold text-center bg-red-100 text-red-600 border-2 border-red-500 transition-all";
                btnIncome.className = "py-2.5 rounded-xl font-bold text-center bg-gray-50 text-gray-500 border border-gray-200 transition-all";
            } else {
                btnIncome.className = "py-2.5 rounded-xl font-bold text-center bg-green-100 text-green-600 border-2 border-green-500 transition-all";
                btnExpense.className = "py-2.5 rounded-xl font-bold text-center bg-gray-50 text-gray-500 border border-gray-200 transition-all";
            }
        }

        function addTransaction() {
            const amountInput = document.getElementById('amount');
            const categoryInput = document.getElementById('category');
            const commentInput = document.getElementById('comment');

            if (!amountInput.value || amountInput.value <= 0) return alert('Введіть коректну суму');

            const transaction = {
                id: Date.now(),
                type: currentType,
                amount: parseFloat(amountInput.value),
                category: categoryInput.value,
                comment: commentInput.value || categoryInput.value,
                date: new Date().toLocaleDateString('uk-UA')
            };

            transactions.unshift(transaction);
            updateUI();

            // Очищення полів
            amountInput.value = '';
            commentInput.value = '';
        }

        function updateUI() {
            const list = document.getElementById('transactions-list');
            list.innerHTML = '';

            let balance = 0;
            let income = 0;
            let expense = 0;

            transactions.forEach(t => {
                if (t.type === 'income') {
                    balance += t.amount;
                    income += t.amount;
                } else {
                    balance -= t.amount;
                    expense += t.amount;
                }

                const item = document.createElement('div');
                item.className = "bg-white p-4 rounded-xl shadow-xs flex justify-between items-center border-l-4 " + (t.type === 'income' ? 'border-green-500' : 'border-red-500');
                item.innerHTML = `
                    <div>
                        <p class="font-bold text-gray-800">${t.comment}</p>
                        <p class="text-xs text-gray-400">${t.category} • ${t.date}</p>
                    </div>
                    <p class="font-black text-lg ${t.type === 'income' ? 'text-green-600' : 'text-red-600'}">
                        ${t.type === 'income' ? '+' : '-'}${t.amount} ₴
                    </p>
                `;
                list.appendChild(item);
            });

            document.getElementById('total-balance').innerText = `${balance.toFixed(2)} ₴`;
            document.getElementById('total-income').innerText = `+${income} ₴`;
            document.getElementById('total-expense').innerText = `-${expense} ₴`;
        }
    </script>
</body>
</html>
